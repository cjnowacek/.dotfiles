general {
    hide_cursor = true
    grace = 5
}

background {
    monitor =
    color = rgba(30, 30, 46, 1.0)
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(137, 180, 250, 0.5)
    inner_color = rgba(49, 50, 68, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <i>$FAIL</i>
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(186, 194, 222, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}
